<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ore chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: #2d2d2d;
            color: #fff;
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 1.125rem;
            font-weight: 500;
        }
        #status {
            padding: 0.375rem 1rem;
            font-size: 0.8125rem;
            color: #666;
            background: #fafafa;
            border-bottom: 1px solid #e0e0e0;
            min-height: 1.75rem;
            display: flex;
            align-items: center;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
            font-size: 0.9375rem;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background: #007bff;
            color: #fff;
        }
        .assistant {
            align-self: flex-start;
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }
        .assistant a { color: #007bff; }
        .assistant pre {
            background: #f4f4f4;
            padding: 0.75rem;
            border-radius: 0.375rem;
            overflow-x: auto;
            font-size: 0.875rem;
            margin: 0.5rem 0;
        }
        .assistant code {
            background: #f4f4f4;
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.875rem;
        }
        .assistant pre code {
            background: none;
            padding: 0;
        }
        .assistant ul, .assistant ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }
        .assistant p { margin: 0.25rem 0; }
        .assistant p:first-child { margin-top: 0; }
        .assistant p:last-child { margin-bottom: 0; }
        .typing .typing-indicator {
            color: #888;
            font-style: italic;
        }
        .reasoning {
            align-self: flex-start;
            background: #f0f0f0;
            color: #555;
            border: 1px solid #e0e0e0;
            font-size: 0.875rem;
        }
        .reasoning details summary {
            cursor: pointer;
            font-weight: 500;
            color: #495057;
            list-style: none;
        }
        .reasoning details summary::marker,
        .reasoning details summary::-webkit-details-marker {
            display: none;
        }
        .reasoning details[open] summary {
            margin-bottom: 0.375rem;
        }
        .reasoning .reasoning-content {
            color: #666;
            white-space: pre-wrap;
            padding-top: 0.25rem;
            border-top: 1px solid #e9ecef;
        }
        .tool-call {
            align-self: flex-start;
            background: #e8f4fd;
            color: #333;
            border: 1px solid #b8daff;
            font-size: 0.875rem;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
        }
        .tool-call .tool-id {
            color: #666;
            font-size: 0.75rem;
        }
        .tool-result {
            align-self: flex-start;
            background: #f8f9fa;
            color: #333;
            border: 1px solid #dee2e6;
            font-size: 0.875rem;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
        }
        .tool-result.error {
            background: #fff3f3;
            border-color: #ffcdd2;
            color: #c62828;
        }
        .tool-result .tool-id {
            color: #666;
            font-size: 0.75rem;
        }
        .tool-call pre,
        .tool-result pre {
            background: #fff;
            padding: 0.5rem;
            border-radius: 0.25rem;
            overflow-x: auto;
            margin-top: 0.375rem;
            font-size: 0.8125rem;
        }
        .tool-call code,
        .tool-result code {
            background: none;
            padding: 0;
            font-size: 0.8125rem;
        }
        #input-area {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            align-items: flex-end;
        }
        #message-input {
            flex: 1;
            padding: 0.625rem 0.875rem;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            resize: none;
            font-family: inherit;
            line-height: 1.4;
            max-height: 8rem;
            min-height: 2.5rem;
        }
        #message-input:focus {
            outline: none;
            border-color: #007bff;
        }
        #send-btn {
            padding: 0.625rem 1.25rem;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.9375rem;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.15s;
        }
        #send-btn:hover:not(:disabled) {
            background: #0056b3;
        }
        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="header">ore chat</div>
    <div id="status">Loading...</div>
    <div id="chat"></div>
    <div id="input-area">
        <textarea id="message-input" rows="1" placeholder="Type a message..."></textarea>
        <button id="send-btn">Send</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/chat.js"></script>
</body>
</html>
